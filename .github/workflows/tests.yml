name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests-hosted:
    name: Hosted Windows tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest -q

  tests-self-hosted:
    name: Self-hosted Windows tests
    runs-on: [self-hosted, windows, x64]
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Show Python version
        shell: powershell
        run: |
          python --version

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        shell: powershell
        run: |
          python -m pytest -q